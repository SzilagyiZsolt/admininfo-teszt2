<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>AdminInfo Slideshow</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        img { max-width: 100%; max-height: 100%; display: none; transition: opacity 1s; }
        .active { display: block; }
    </style>
</head>
<body>
    <div id="gallery"></div>

    <script>
        let images = [];
        let currentIndex = 0;

        async function loadImages() {
            try {
                const res = await fetch('json/kepek.txt');
                images = await res.json();
                if(images.length > 0) {
                    renderImage();
                    setInterval(nextImage, 5000);
                }
            } catch (e) { console.error("Hiba:", e); }
        }

        function renderImage() {
            const container = document.getElementById('gallery');
            container.innerHTML = `<img src="kepek/${images[currentIndex]}" class="active">`;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            renderImage();
        }

        loadImages();
    </script>
</body>
</html>
